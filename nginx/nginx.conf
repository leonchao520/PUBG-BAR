upstream nuxt {
    server nuxt:3000;
}

upstream api {
    server api:8000;
}

# 缓存配置
proxy_cache_path /var/cache/nginx/pubg levels=1:2 keys_zone=pubg-cache:10m max_size=1g inactive=60m use_temp_path=off;
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static-cache:50m max_size=5g inactive=365d use_temp_path=off;

# 限流配置
limit_req_zone $binary_remote_addr zone=pubg-limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=search-limit:10m rate=5r/s;

server {
    listen 80;
    server_name pubg.plus;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pubg.plus;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 前端 SSR 请求
    location / {
        proxy_pass http://nuxt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 静态资源缓存 1 年
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://nuxt;
            proxy_cache static-cache;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 路由
    location /api/ {
        proxy_pass http://api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 限流
        limit_req zone=pubg-limit burst=10 nodelay;

        # 缓存 GET 请求
        proxy_cache pubg-cache;
        proxy_cache_key "$scheme$request_method$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 10s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 玩家搜索 API - 更严格的限流
    location /api/players/search {
        proxy_pass http://api/api/players/search;
        proxy_set_header Host $host;
        limit_req zone=search-limit burst=5 nodelay;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # 健康检查
    location /health {
        proxy_pass http://api/health;
        proxy_cache off;
        access_log off;
    }
}
