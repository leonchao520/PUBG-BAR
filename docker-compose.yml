services:
  # nginx:  # 生产环境再启用，需要 SSL 证书
  #   image: nginx:alpine
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - nuxt
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - app-net

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://api:8000
      - NUXT_PUBLIC_DEV_MODE=true
    restart: unless-stopped
    networks:
      - app-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DEV_MODE=true
      - DATABASE_URL=postgresql+asyncpg://pubg:${DB_PASSWORD:-pubg123}@postgres:5432/pubg
      - REDIS_URL=redis://redis:6379/0
      - PUBG_API_KEY=${PUBG_API_KEY}
      - CORS_ORIGINS=http://nuxt:3000,https://${DOMAIN:-pubg.plus}
    ports:
      - "8000:8000"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - app-net

  postgres:
    image: postgres:16-alpine
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: pubg
      POSTGRES_USER: pubg
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pubg123}
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubg -d pubg"]
      interval: 5s
      retries: 5

volumes:
  pg-data:
  redis-data:

networks:
  app-net:
    driver: bridge
