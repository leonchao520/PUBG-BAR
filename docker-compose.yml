services:
  # Nginx 反代（生产环境需配置 SSL）
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      nuxt:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-net

  # Nuxt 前端（SSR + ISR）
  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://api:8000
    restart: unless-stopped
    networks:
      - app-net

  # FastAPI 后端
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DEV_MODE=${DEV_MODE:-true}
      - DATABASE_URL=postgresql+asyncpg://pubg:${DB_PASSWORD:-pubg123}@postgres:5432/pubg
      - REDIS_URL=redis://redis:6379/0
      - PUBG_API_KEY=${PUBG_API_KEY}
      - CORS_ORIGINS=http://nuxt:3000,http://localhost:3000,https://${DOMAIN:-pubg.plus}
    ports:
      - "8000:8000"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --lazyfree-lazy-eviction yes
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - app-net

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: pubg
      POSTGRES_USER: pubg
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pubg123}
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubg -d pubg"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pg-data:
  redis-data:
  nginx-cache:

networks:
  app-net:
    driver: bridge
